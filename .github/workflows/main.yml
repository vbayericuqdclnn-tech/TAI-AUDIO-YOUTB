name: YouTube Audio to Drive

on:
  workflow_dispatch:
  schedule:
    - cron: "0 1 * * *"
    - cron: "0 5 * * *"
    - cron: "0 9 * * *"
    - cron: "0 13 * * *"
    - cron: "0 17 * * *"
    - cron: "0 21 * * *"

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    permissions:
      contents: write

    env:
      MAX_PER_RUN: "40"
      SLEEP_SECONDS: "7"
      TOKEN_TTL: "6"
      GDRIVE_FOLDER_ID: ${{ secrets.GDRIVE_FOLDER_ID }}
      GDRIVE_OAUTH_TOKEN_JSON: ${{ secrets.GDRIVE_OAUTH_TOKEN_JSON }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: "v2.x"

      - name: Install system packages
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg git

      - name: Install Python packages
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install --upgrade --pre "yt-dlp[default]"
          python -m pip install --upgrade yt-dlp-ejs
          python -m pip install --upgrade bgutil-ytdlp-pot-provider
          python -m pip install --upgrade google-api-python-client google-auth google-auth-httplib2 google-auth-oauthlib
          yt-dlp --version
          python - <<'PY'
          import yt_dlp
          print("yt_dlp:", yt_dlp.version.__version__)
          PY

      - name: Install bgutil provider server
        run: |
          rm -rf "$HOME/bgutil-ytdlp-pot-provider"
          git clone --depth 1 https://github.com/Brainicism/bgutil-ytdlp-pot-provider.git "$HOME/bgutil-ytdlp-pot-provider"
          cd "$HOME/bgutil-ytdlp-pot-provider/server"
          npm ci
          npx tsc
          test -f build/main.js
          echo "BGUTIL_SERVER_HOME=$HOME/bgutil-ytdlp-pot-provider/server"

      - name: Write cookies file
        env:
          YT_COOKIES_MULTI: ${{ secrets.YT_COOKIES_MULTI }}
        run: |
          mkdir -p data
          if [ -n "${YT_COOKIES_MULTI}" ]; then
            printf '%s' "${YT_COOKIES_MULTI}" > data/cookies_multi.txt
            echo "cookies_multi.txt created"
          else
            echo "YT_COOKIES_MULTI not set; guest mode still works for public videos"
          fi

      - name: Prepare audio temp dir
        run: |
          rm -rf "$RUNNER_TEMP/audio" || true
          rm -f data/audio || true
          mkdir -p "$RUNNER_TEMP/audio"
          ln -s "$RUNNER_TEMP/audio" data/audio

      - name: Show files
        run: |
          echo "repo:"
          ls -la
          echo
          echo "scripts:"
          ls -la scripts || true
          echo
          echo "data:"
          ls -la data || true
          echo
          sed -n '1,80p' scripts/yt_audio_to_drive.py

      - name: Run downloader
        env:
          BGUTIL_SERVER_HOME: ${{ runner.temp }}/../home/runner/bgutil-ytdlp-pot-provider/server
        run: |
          set -euo pipefail
          mkdir -p data
          rm -rf scripts/data
          ln -s "$(pwd)/data" scripts/data
          export BGUTIL_SERVER_HOME="$HOME/bgutil-ytdlp-pot-provider/server"
          export TOKEN_TTL="${TOKEN_TTL}"
          python -u scripts/yt_audio_to_drive.py

      - name: Commit dalay.txt
        if: always()
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --global --add safe.directory "$GITHUB_WORKSPACE"

          if git diff --quiet --exit-code -- data/dalay.txt; then
            echo "No changes in dalay.txt"
            exit 0
          fi

          git add data/dalay.txt
          git commit -m "chore: update dalay.txt" || exit 0
          git pull --rebase origin "${{ github.ref_name }}" || true
          git push origin "HEAD:${{ github.ref_name }}"

      - name: Disk usage
        if: always()
        run: |
          df -h
          du -sh . || true
